services:
  # 1. ADD THE MESSAGE BROKER
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports: ["8000:8000"]
    # 2. ADD ENVIRONMENT VARIABLES AND DEPENDENCY
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 2G # API stays lean

  worker_math:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: celery -A src.workers.tasks worker --loglevel=info -Q math_queue
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    # --- ADD THIS LINE ---
    volumes: [ "./models:/app/models" ]
    # ---------------------
    deploy:
      resources:
        limits:
          memory: 4G

  worker_llm:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: celery -A src.workers.tasks worker --loglevel=info -Q llm_queue
    volumes: ["./models:/app/models"]
    # 4. ADD ENVIRONMENT VARIABLES AND DEPENDENCY
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 6G # SLM gets its own dedicated RAM slice

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: streamlit run src/ui/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 1G